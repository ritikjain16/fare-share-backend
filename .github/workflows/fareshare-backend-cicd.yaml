name: CI / CD — Build → DevSecOps → ECR → GitOps (ArgoCD)

# Run on push to main (customize branches) and PRs
on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

env:
  ECR_REGISTRY: ${{secrets.AWS_ACCOUNT_ID}}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
  FARE_SHARE_BACKEND_REPO: fareshare-backend

permissions:
  contents: write
  id-token: write # required for OIDC to AWS
  issues: write
  pull-requests: write

jobs:
  checkout:
    name: Checkout + Cache
    runs-on: ubuntu-latest
    outputs:
      commit: ${{ steps.commit.outputs.sha }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set commit output
        id: commit
        run: echo "sha=${GITHUB_SHA}" >> $GITHUB_OUTPUT

  build-fareshare-backend:
    name: Build & Push Fareshare Backend
    runs-on: ubuntu-latest
    needs: checkout
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v1
      - name: Configure Docker to use ECR credentials
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{secrets.AWS_ACCOUNT_ID}}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
      - name: Build and push
        run: |
          TAG=${{ needs.checkout.outputs.commit }}-${{ github.run_number }}
          IMAGE=${{ env.ECR_REGISTRY }}/${{ env.FARE_SHARE_BACKEND_REPO }}:$TAG
          echo "Building image: $IMAGE"
          docker build -t $IMAGE .
          docker push $IMAGE

  update-manifests:
    name: Update K8s Manifests
    runs-on: ubuntu-latest
    needs: [checkout, build-fareshare-backend]
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Update manifest files
        run: |
          TAG=${{ needs.checkout.outputs.commit }}-${{ github.run_number }}
          FARESHARE_BACKEND_IMAGE=${{ env.ECR_REGISTRY }}/${{ env.FARE_SHARE_BACKEND_REPO }}:$TAG

          echo "Updating manifests with tag: $TAG"

          sed -i "s|image: .*|image: $FARESHARE_BACKEND_IMAGE|" k8s/deployment.yaml

          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add k8s/
          git commit -m "Update image tags to $TAG" || exit 0
          git push

  notify-argocd:
    name: Notify ArgoCD for Deployment
    runs-on: ubuntu-latest
    needs: update-manifests
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Trigger ArgoCD Sync
        run: |
          curl -k -X POST -u ${{ secrets.ARGOCD_USERNAME }}:${{ secrets.ARGOCD_PASSWORD }} \
          https://${{ secrets.ARGOCD_HOST }}/api/v1/applications/${{ secrets.ARGOCD_APP_NAME }}/sync

  cleanup:
    name: Cleanup Docker Images
    runs-on: ubuntu-latest
    needs: [build-fareshare-backend, update-manifests]
    if: always()
    steps:
      - uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Delete old ECR images
        run: |
          for repo in ${{ env.FARE_SHARE_BACKEND_REPO }}; do
            echo "Processing repository: $repo"
            
            # Get total image count
            TOTAL_IMAGES=$(aws ecr list-images --repository-name $repo --query 'length(imageIds)' --output text)
            echo "Total images in $repo: $TOTAL_IMAGES"
            
            if [ "$TOTAL_IMAGES" -gt 2 ]; then
              # Get old images (keep only latest 2)
              OLD_IMAGES=$(aws ecr describe-images --repository-name $repo --query 'sort_by(imageDetails,&imagePushedAt)[:-2].[imageDigest,imageTags[0]]' --output json | jq -r '.[] | {imageDigest: .[0], imageTag: .[1]}')
              echo "Old images to delete in $repo: $OLD_IMAGES"
              
              # Delete old images one by one
              aws ecr describe-images --repository-name $repo --query 'sort_by(imageDetails,&imagePushedAt)[:-2].imageDigest' --output text | tr '\t' '\n' | while read digest; do
                if [ -n "$digest" ]; then
                  echo "Deleting image with digest: $digest"
                  aws ecr batch-delete-image --repository-name $repo --image-ids imageDigest=$digest
                fi
              done
            else
              echo "Only $TOTAL_IMAGES images in $repo, keeping all"
            fi
          done
      - name: Delete local Docker images
        run: |
          docker system prune -af
          docker image prune -af

